<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InbXr — Server Error</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0b0f1a;
      --card-bg: #111827;
      --text: #e2e8f0;
      --text-dim: rgba(255,255,255,0.5);
      --red: #ef4444;
      --border: rgba(255,255,255,0.08);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .error-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 440px;
      width: 90%;
    }
    .error-code {
      font-size: 4rem;
      font-weight: 700;
      color: var(--red);
      line-height: 1;
      margin-bottom: 12px;
    }
    .error-title {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .error-message {
      font-size: 0.9rem;
      color: var(--text-dim);
      line-height: 1.6;
      margin-bottom: 28px;
    }
    .error-link {
      display: inline-block;
      padding: 12px 28px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-weight: 600;
      border-radius: 999px;
      text-decoration: none;
      font-size: 0.9rem;
      transition: opacity 0.2s;
    }
    .error-link:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="error-card">
    <div class="error-code">500</div>
    <h1 class="error-title">Something Went Wrong</h1>
    <p class="error-message">We hit an unexpected error. Please try again in a moment.</p>
    <a href="/" class="error-link">Back to Home</a>
  </div>
</body>
</html>
