<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INBXR — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/style.css" />
  {% if is_admin %}<link rel="stylesheet" href="/static/css/admin.css" />{% endif %}
</head>
<body class="dashboard-page{% if is_admin %} admin-mode{% endif %}"{% if is_admin %} data-page="dashboard"{% endif %}>

{% if is_admin %}
<div class="admin-toolbar">
  <span class="admin-toolbar__label"><span class="admin-toolbar__dot"></span>Editing Mode</span>
  <span class="admin-toolbar__sep"></span>
  <a href="/admin/logout">Exit Editor</a>
</div>
{% endif %}

<div id="page-sections">
{% for section in sections %}
  <div class="page-section{% if is_admin %} editable-section{% endif %}{% if not section.draggable and is_admin %} page-section--locked{% endif %}"
       data-section-id="{{ section.id }}" data-section-type="{{ section.type }}">
    {% if is_admin and section.draggable %}
    <div class="section-drag-handle" title="Drag to reorder">&#9776;</div>
    {% endif %}
    {% include 'sections/' ~ section.type ~ '.html' %}
  </div>
{% endfor %}
</div>

<script src="/static/js/dashboard.js"></script>
</body>
</html>
