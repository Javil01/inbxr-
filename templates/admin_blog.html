<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InbXr Admin — Blog Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/style.css?v=20260403b" />
  <style>
    body { background: #0f172a; color: #e2e8f0; font-family: 'Inter', sans-serif; }

    .ab { max-width: 1100px; margin: 0 auto; padding: 28px 24px; }
    .ab-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    .ab-header h1 { font-size: 1.4rem; font-weight: 700; margin: 0; color: #f1f5f9; }
    .ab-header-links { display: flex; gap: 12px; align-items: center; }
    .ab-header-links a { color: #c7d2fe; text-decoration: none; font-size: 0.85rem; }

    .ab-btn { display: inline-block; padding: 8px 18px; border-radius: 999px; font-size: 0.82rem; font-weight: 600; cursor: pointer; border: none; text-decoration: none; transition: filter 0.15s; }
    .ab-btn--green { background: #16a34a; color: #fff; }
    .ab-btn--green:hover { filter: brightness(1.15); }
    .ab-btn--red { background: rgba(239,68,68,0.15); color: #ef4444; border: none; cursor: pointer; font-size: 0.78rem; padding: 4px 12px; border-radius: 999px; font-weight: 600; }
    .ab-btn--red:hover { background: rgba(239,68,68,0.25); }

    /* Stats */
    .ab-stats { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
    .ab-stat { background: #1e293b; border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; padding: 16px 20px; min-width: 120px; flex: 1; }
    .ab-stat__num { font-size: 1.6rem; font-weight: 800; display: block; color: #c7d2fe; }
    .ab-stat__num--green { color: #22c55e; }
    .ab-stat__num--amber { color: #f59e0b; }
    .ab-stat__label { font-size: 0.72rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }

    /* Categories section */
    .ab-categories { margin-bottom: 24px; }
    .ab-categories h3 { font-size: 0.82rem; font-weight: 700; margin: 0 0 12px; text-transform: uppercase; letter-spacing: 0.5px; color: #94a3b8; }
    .ab-cat-form { display: flex; gap: 8px; margin-bottom: 12px; }
    .ab-cat-form input { flex: 1; padding: 8px 14px; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; font-size: 0.85rem; background: #1e293b; color: #e2e8f0; outline: none; }
    .ab-cat-form input:focus { border-color: #16a34a; }
    .ab-cat-list { display: flex; gap: 8px; flex-wrap: wrap; }
    .ab-cat-chip { display: inline-flex; align-items: center; gap: 6px; padding: 5px 14px; border-radius: 999px; font-size: 0.78rem; font-weight: 600; background: rgba(22,163,74,0.1); color: #22c55e; }
    .ab-cat-chip button { background: none; border: none; color: #64748b; cursor: pointer; font-size: 0.9rem; padding: 0; line-height: 1; }
    .ab-cat-chip button:hover { color: #ef4444; }

    /* Table */
    .ab-table-wrap { overflow-x: auto; background: #1e293b; border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; }
    .ab-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    .ab-table th { padding: 12px 14px; text-align: left; font-weight: 600; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.5px; color: #94a3b8; border-bottom: 1px solid rgba(255,255,255,0.06); white-space: nowrap; }
    .ab-table td { padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,0.04); vertical-align: middle; }
    .ab-table tr:last-child td { border-bottom: none; }
    .ab-table tr:hover td { background: rgba(255,255,255,0.02); }

    .ab-title-cell { font-weight: 600; color: #f1f5f9; }
    .ab-status { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
    .ab-status--published { background: rgba(34,197,94,0.12); color: #22c55e; }
    .ab-status--draft { background: rgba(245,158,11,0.12); color: #f59e0b; }
    .ab-date { white-space: nowrap; color: #64748b; font-size: 0.76rem; }
    .ab-actions { display: flex; gap: 8px; }
    .ab-actions a { color: #c7d2fe; text-decoration: none; font-size: 0.8rem; font-weight: 600; }
    .ab-actions a:hover { text-decoration: underline; color: #e0e7ff; }

    .ab-empty { text-align: center; padding: 40px; color: #64748b; font-size: 0.88rem; }
  </style>
  {% include 'sections/_head_meta.html' %}
</head>
<body>

{% include 'sections/header.html' %}

<div class="ab">
  <div class="ab-header">
    <h1>Blog Manager</h1>
    <div class="ab-header-links">
      <a href="/admin/blog/new" class="ab-btn ab-btn--green">+ New Post</a>
      <a href="/admin">&larr; Admin Dashboard</a>
    </div>
  </div>

  <!-- Stats -->
  <div class="ab-stats" id="abStats">
    <div class="ab-stat">
      <span class="ab-stat__num" id="statTotal">0</span>
      <span class="ab-stat__label">Total Posts</span>
    </div>
    <div class="ab-stat">
      <span class="ab-stat__num ab-stat__num--green" id="statPublished">0</span>
      <span class="ab-stat__label">Published</span>
    </div>
    <div class="ab-stat">
      <span class="ab-stat__num ab-stat__num--amber" id="statDrafts">0</span>
      <span class="ab-stat__label">Drafts</span>
    </div>
  </div>

  <!-- Categories -->
  <div class="ab-categories">
    <h3>Categories</h3>
    <div class="ab-cat-form">
      <input type="text" id="catName" placeholder="New category name..." />
      <button class="ab-btn ab-btn--green" onclick="addCategory()">Add</button>
    </div>
    <div class="ab-cat-list" id="catList"></div>
  </div>

  <!-- Posts table -->
  <div class="ab-table-wrap">
    <table class="ab-table">
      <thead>
        <tr>
          <th>Title</th>
          <th>Status</th>
          <th>Category</th>
          <th>Date</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="abBody">
        <tr><td colspan="5" class="ab-empty">Loading posts...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script src="/static/js/admin_blog.js"></script>

</body>
</html>
