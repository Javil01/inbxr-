<div class="tool-hero">
  <div class="tool-hero__inner">
    <span class="tool-hero__eyebrow"
      {% if is_admin %}contenteditable="true" data-field="eyebrow"{% endif %}>{{ section.editable_fields.eyebrow }}</span>
    <h1 class="tool-hero__h1"
      {% if is_admin %}contenteditable="true" data-field="heading"{% endif %}>{{ section.editable_fields.heading }}</h1>
    <p class="tool-hero__p"
      {% if is_admin %}contenteditable="true" data-field="description"{% endif %}>{{ section.editable_fields.description }}</p>

    <div class="tool-hero__features">
      {% for chip in section.editable_fields.chips %}
      <span class="feature-chip"
        {% if is_admin %}contenteditable="true" data-field="chips" data-chip-index="{{ loop.index0 }}"{% endif %}>{{ chip }}</span>
      {% endfor %}
    </div>
  </div>
</div>
