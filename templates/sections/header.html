<header class="site-header">
  <div class="header-inner">
    <div class="logo">
      <span class="logo-mark">IN</span>
      <a href="/" class="logo-wordmark">INBXR</a>
    </div>
    <button class="nav-toggle" aria-label="Toggle navigation" onclick="document.querySelector('.site-nav').classList.toggle('open');this.classList.toggle('active')">
      <span></span><span></span><span></span>
    </button>
    <nav class="site-nav">
      <a href="/"               class="nav-link nav-link--featured{% if active_page == 'index' %} nav-link--active{% endif %}">Email Test</a>
      <a href="/analyzer"       class="nav-link{% if active_page == 'analyzer' %} nav-link--active{% endif %}">Email Analyzer</a>
      <a href="/sender"         class="nav-link{% if active_page == 'sender' %} nav-link--active{% endif %}">Sender Check</a>
      <a href="/placement"      class="nav-link{% if active_page == 'placement' %} nav-link--active{% endif %}">Inbox Placement</a>
      <div class="nav-dropdown">
        <button class="nav-link nav-link--dropdown{% if active_page in ['subject_scorer','bimi','header_analyzer','blacklist_monitor','warmup','email_verifier'] %} nav-link--active{% endif %}">
          More Tools
          <svg width="10" height="6" viewBox="0 0 10 6" fill="none"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div class="nav-dropdown__menu">
          <a href="/subject-scorer"    class="nav-dropdown__link{% if active_page == 'subject_scorer' %} nav-dropdown__link--active{% endif %}">Subject Scorer</a>
          <a href="/bimi"              class="nav-dropdown__link{% if active_page == 'bimi' %} nav-dropdown__link--active{% endif %}">BIMI Checker</a>
          <a href="/header-analyzer"   class="nav-dropdown__link{% if active_page == 'header_analyzer' %} nav-dropdown__link--active{% endif %}">Header Analyzer</a>
          <a href="/blacklist-monitor" class="nav-dropdown__link{% if active_page == 'blacklist_monitor' %} nav-dropdown__link--active{% endif %}">Blacklist Monitor</a>
          <a href="/email-verifier"    class="nav-dropdown__link{% if active_page == 'email_verifier' %} nav-dropdown__link--active{% endif %}">Email Verifier</a>
          <a href="/warmup"            class="nav-dropdown__link{% if active_page == 'warmup' %} nav-dropdown__link--active{% endif %}">Warm-up Tracker</a>
        </div>
      </div>
      <a href="/dashboard"      class="nav-link{% if active_page == 'dashboard' %} nav-link--active{% endif %}">Dashboard</a>
      {% if is_admin %}
      <a href="/admin/logout" class="nav-link" style="color:var(--red);margin-left:8px">Logout</a>
      {% endif %}
    </nav>
  </div>
</header>
