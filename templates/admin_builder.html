<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INBXR Builder — {{ page_name }}</title>
  <link rel="stylesheet" href="https://unpkg.com/grapesjs@0.21.13/dist/grapes.min.css" />
  <link rel="stylesheet" href="/static/css/builder.css" />
</head>
<body data-page="{{ page_name }}">

  <div id="builder-topbar">
    <div class="bt-left">
      <a href="/admin" class="bt-back">&larr; Admin</a>
      <span class="bt-sep"></span>
      <span class="bt-page">{{ page_name }}</span>
      <span class="bt-status" id="draftStatus" title="Draft status">Draft</span>
    </div>
    <div class="bt-center">
      <button class="bt-tab" data-panel="blocks" title="Blocks">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      </button>
      <button class="bt-tab" data-panel="versions" title="Versions">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      </button>
      <button class="bt-tab" data-panel="templates" title="Templates">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      </button>
      <button class="bt-tab" data-panel="media" title="Media Library">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
      </button>
      <button class="bt-tab" data-panel="seo" title="SEO">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      <button class="bt-tab" data-panel="analytics" title="Analytics">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      </button>
    </div>
    <div class="bt-right">
      <button class="bt-btn bt-btn--clear" id="clearBtn">Reset</button>
      <button class="bt-btn bt-btn--draft" id="saveDraftBtn">Save Draft</button>
      <button class="bt-btn bt-btn--save" id="publishBtn">Publish</button>
    </div>
  </div>

  <div id="builder-body">
    <div id="gjs"></div>

    <!-- Right Sidebar Panels -->
    <div id="builder-sidebar" class="bs-hidden">

      <!-- Versions Panel -->
      <div class="bs-panel" id="panel-versions" style="display:none;">
        <div class="bs-panel-header">
          <h3>Version History</h3>
          <button class="bs-close" onclick="closeSidebar()">&times;</button>
        </div>
        <div class="bs-panel-actions">
          <input type="text" id="versionLabel" placeholder="Version label..." class="bs-input" />
          <button class="bs-action-btn" onclick="saveVersion()">Save Version</button>
        </div>
        <div id="versionList" class="bs-list"></div>
      </div>

      <!-- Templates Panel -->
      <div class="bs-panel" id="panel-templates" style="display:none;">
        <div class="bs-panel-header">
          <h3>Templates</h3>
          <button class="bs-close" onclick="closeSidebar()">&times;</button>
        </div>
        <div class="bs-panel-actions">
          <input type="text" id="templateName" placeholder="Template name..." class="bs-input" />
          <input type="text" id="templateDesc" placeholder="Description (optional)" class="bs-input" />
          <button class="bs-action-btn" onclick="saveAsTemplate()">Save Current as Template</button>
        </div>
        <hr class="bs-divider" />
        <div id="templateList" class="bs-list"></div>
      </div>

      <!-- Media Library Panel -->
      <div class="bs-panel" id="panel-media" style="display:none;">
        <div class="bs-panel-header">
          <h3>Media Library</h3>
          <button class="bs-close" onclick="closeSidebar()">&times;</button>
        </div>
        <div class="bs-panel-actions">
          <input type="text" id="mediaSearch" placeholder="Search media..." class="bs-input" oninput="searchMedia()" />
          <label class="bs-upload-btn">
            Upload Image
            <input type="file" id="mediaUpload" accept="image/*" style="display:none" onchange="uploadMedia()" />
          </label>
        </div>
        <div id="mediaGrid" class="bs-media-grid"></div>
      </div>

      <!-- SEO Panel -->
      <div class="bs-panel" id="panel-seo" style="display:none;">
        <div class="bs-panel-header">
          <h3>SEO Settings</h3>
          <button class="bs-close" onclick="closeSidebar()">&times;</button>
        </div>
        <div class="bs-seo-form">
          <label class="bs-label">Meta Title</label>
          <input type="text" id="seoTitle" class="bs-input" placeholder="Page title for search engines" />
          <span class="bs-char-count" id="seoTitleCount">0/60</span>

          <label class="bs-label">Meta Description</label>
          <textarea id="seoDesc" class="bs-textarea" placeholder="Page description for search engines" rows="3"></textarea>
          <span class="bs-char-count" id="seoDescCount">0/160</span>

          <label class="bs-label">OG Title</label>
          <input type="text" id="ogTitle" class="bs-input" placeholder="Title for social sharing" />

          <label class="bs-label">OG Description</label>
          <textarea id="ogDesc" class="bs-textarea" placeholder="Description for social sharing" rows="2"></textarea>

          <label class="bs-label">OG Image URL</label>
          <input type="text" id="ogImage" class="bs-input" placeholder="/static/uploads/og-image.png" />

          <label class="bs-label">Canonical URL</label>
          <input type="text" id="canonicalUrl" class="bs-input" placeholder="https://inbxr.com/page" />

          <label class="bs-label">JSON-LD</label>
          <textarea id="jsonLd" class="bs-textarea" placeholder='{"@type": "WebPage", ...}' rows="4" style="font-family:monospace;font-size:0.72rem;"></textarea>

          <label class="bs-checkbox-label">
            <input type="checkbox" id="noindex" /> Noindex (hide from search engines)
          </label>

          <button class="bs-action-btn" onclick="saveSeo()" style="margin-top:12px;">Save SEO</button>
        </div>
      </div>

      <!-- Analytics Panel -->
      <div class="bs-panel" id="panel-analytics" style="display:none;">
        <div class="bs-panel-header">
          <h3>Page Analytics</h3>
          <button class="bs-close" onclick="closeSidebar()">&times;</button>
        </div>
        <div id="analyticsContent" class="bs-analytics"></div>
      </div>

    </div>
  </div>

  <script src="https://unpkg.com/grapesjs@0.21.13/dist/grapes.min.js"></script>
  <script src="/static/js/builder.js"></script>
</body>
</html>
