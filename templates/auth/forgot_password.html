{% extends "auth/base_auth.html" %}
{% block title %}Forgot Password{% endblock %}
{% block content %}
<h1 class="auth-card__title">Reset Password</h1>

{% if success %}
<div class="auth-alert auth-alert--success">If that email exists, we sent a reset link. Check your inbox.</div>
{% else %}
  {% if error %}
  <div class="auth-alert auth-alert--error">{{ error }}</div>
  {% endif %}
  <form method="post" class="auth-form">
    <label class="auth-label">
      <span>Email</span>
      <input type="email" name="email" required autocomplete="email" placeholder="you@company.com" />
    </label>
    <button type="submit" class="auth-btn">Send Reset Link</button>
  </form>
{% endif %}

<p class="auth-card__footer"><a href="{{ url_for('auth.login') }}">Back to login</a></p>
{% endblock %}
