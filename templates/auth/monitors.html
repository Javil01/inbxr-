{% extends "auth/base_auth.html" %}
{% block title %}Domain Monitors{% endblock %}

{% block content %}
<div class="monitors-page">
  <h2 style="margin:0 0 4px;">Blocklist Monitors</h2>
  <p class="monitor-limit" id="monitorLimit">Loading...</p>

  <!-- Add domain form -->
  <form class="monitor-add-form" id="addMonitorForm" onsubmit="return addMonitor(event)">
    <input type="text" id="monDomain" placeholder="example.com" required class="input" />
    <input type="text" id="monIP" placeholder="IP (optional)" class="input" style="max-width:160px;" />
    <button type="submit" class="btn btn--primary" id="addBtn">Add Domain</button>
  </form>

  <!-- Monitor list -->
  <div id="monitorList" class="monitor-list">
    <p style="color:var(--text-3);text-align:center;padding:32px 0;">Loading monitors...</p>
  </div>

  <!-- Alert Preferences -->
  <div style="margin-top:40px;border-top:1px solid rgba(255,255,255,0.06);padding-top:24px;">
    <h3 style="margin:0 0 16px;">Alert Preferences</h3>
    <div id="alertPrefs" style="opacity:0.5;">Loading preferences...</div>
  </div>

  <!-- Recent Alerts -->
  <div style="margin-top:32px;border-top:1px solid rgba(255,255,255,0.06);padding-top:24px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h3 style="margin:0;">Recent Alerts</h3>
      <button class="btn btn--small btn--outline" onclick="markAllRead()">Mark All Read</button>
    </div>
    <div id="alertList">
      <p style="color:var(--text-3);text-align:center;padding:24px 0;">Loading alerts...</p>
    </div>
  </div>
</div>

<style>
.auth-card:has(.monitors-page) { max-width: 800px; }
</style>

<script>
(function(){
  const tierLimit = {{ tier_limit }};
  let monitors = [];

  function fmt(dt) {
    if (!dt) return 'Never';
    const d = new Date(dt + 'Z');
    return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  }

  function loadMonitors() {
    fetch('/api/monitors').then(r => r.json()).then(data => {
      if (!data.ok) return;
      monitors = data.monitors;
      renderLimit(data.count, data.limit);
      renderList(monitors);
    });
  }

  function renderLimit(count, limit) {
    document.getElementById('monitorLimit').textContent = count + ' of ' + limit + ' domains';
    const addBtn = document.getElementById('addBtn');
    if (count >= limit) {
      addBtn.disabled = true;
      addBtn.textContent = 'Limit reached';
    } else {
      addBtn.disabled = false;
      addBtn.textContent = 'Add Domain';
    }
  }

  function renderList(items) {
    const el = document.getElementById('monitorList');
    if (!items.length) {
      el.innerHTML = '<p style="color:var(--text-3);text-align:center;padding:32px 0;">No domains being monitored yet. Add one above.</p>';
      return;
    }
    el.innerHTML = items.map(m => {
      const scan = m.last_scan;
      const statusDot = scan ? (scan.clean ? 'monitor-card__status--clean' : 'monitor-card__status--listed') : 'monitor-card__status--unknown';
      const statusText = scan ? (scan.clean ? 'Clean' : scan.listed_count + ' listing(s)') : 'Not scanned';
      const lastScan = scan ? fmt(scan.scanned_at) : 'Never';
      const ipText = m.ip ? ' &middot; ' + m.ip : '';
      return `
        <div class="monitor-card" data-id="${m.id}">
          <div class="monitor-card__info">
            <div class="monitor-card__status ${statusDot}"></div>
            <div>
              <strong class="monitor-card__domain">${m.domain}</strong>
              <span class="monitor-card__meta">${ipText}</span>
              <div class="monitor-card__sub">${statusText} &middot; Last scan: ${lastScan}</div>
            </div>
          </div>
          <div class="monitor-card__actions">
            <button class="btn btn--small btn--outline" onclick="toggleHistory(${m.id})">History</button>
            <button class="btn btn--small btn--outline" onclick="dnsCheck(${m.id}, this)">DNS Check</button>
            <button class="btn btn--small btn--primary" onclick="scanDomain(${m.id}, this)">Scan Now</button>
            <button class="btn btn--small btn--danger" onclick="removeDomain(${m.id})">Remove</button>
          </div>
          <div class="monitor-card__history" id="history-${m.id}" style="display:none;"></div>
        </div>`;
    }).join('');
  }

  window.addMonitor = function(e) {
    e.preventDefault();
    const domain = document.getElementById('monDomain').value.trim();
    const ip = document.getElementById('monIP').value.trim();
    if (!domain) return;
    const btn = document.getElementById('addBtn');
    btn.disabled = true; btn.textContent = 'Adding...';
    fetch('/api/monitors', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({domain, ip: ip || null})
    }).then(r => r.json()).then(data => {
      if (data.ok) {
        document.getElementById('monDomain').value = '';
        document.getElementById('monIP').value = '';
        loadMonitors();
      } else {
        showToast(data.error || 'Failed to add domain.', 'error');
        btn.disabled = false; btn.textContent = 'Add Domain';
      }
    }).catch(() => { btn.disabled = false; btn.textContent = 'Add Domain'; });
  };

  window.removeDomain = function(id) {
    if (!confirm('Remove this domain from monitoring?')) return;
    fetch('/api/monitors/' + id, {method: 'DELETE'}).then(r => r.json()).then(data => {
      if (data.ok) loadMonitors();
      else showToast(data.error || 'Failed to remove.', 'error');
    });
  };

  window.scanDomain = function(id, btn) {
    btn.disabled = true; btn.textContent = 'Scanning...';
    fetch('/api/monitors/' + id + '/scan', {method: 'POST'}).then(r => r.json()).then(data => {
      btn.disabled = false; btn.textContent = 'Scan Now';
      if (data.ok) loadMonitors();
      else showToast(data.error || 'Scan failed.', 'error');
    }).catch(() => { btn.disabled = false; btn.textContent = 'Scan Now'; });
  };

  window.toggleHistory = function(id) {
    const el = document.getElementById('history-' + id);
    if (el.style.display !== 'none') { el.style.display = 'none'; return; }
    el.innerHTML = '<p style="padding:8px;color:var(--text-3);">Loading...</p>';
    el.style.display = 'block';
    fetch('/api/monitors/' + id + '/history?limit=10').then(r => r.json()).then(data => {
      if (!data.ok || !data.history.length) {
        el.innerHTML = '<p style="padding:8px;color:var(--text-3);">No scan history yet.</p>';
        return;
      }
      let html = '<table class="history-table" style="width:100%;font-size:0.85rem;margin-top:8px;"><thead><tr><th>Date</th><th>Lists</th><th>Listed</th><th>Status</th></tr></thead><tbody>';
      data.history.forEach(s => {
        const cls = s.clean ? 'badge--green' : 'badge--red';
        const label = s.clean ? 'Clean' : s.listed_count + ' listed';
        html += `<tr>
          <td>${fmt(s.scanned_at)}</td>
          <td>${s.total_lists}</td>
          <td>${s.listed_count}</td>
          <td><span class="badge ${cls}">${label}</span></td>
        </tr>`;
      });
      html += '</tbody></table>';
      el.innerHTML = html;
    });
  };

  /* ── DNS Check ── */
  window.dnsCheck = function(id, btn) {
    btn.disabled = true; btn.textContent = 'Checking...';
    fetch('/api/monitors/' + id + '/dns-check', {method: 'POST'}).then(r => r.json()).then(data => {
      btn.disabled = false; btn.textContent = 'DNS Check';
      if (!data.ok) { showToast(data.error || 'DNS check failed.', 'error'); return; }
      let msg = 'DNS Auth Results for ' + data.domain + ':\n\n';
      msg += 'SPF: ' + (data.spf.record ? 'Found' : 'MISSING') + '\n';
      msg += 'DKIM: ' + (data.dkim.valid ? 'Valid' : 'NOT FOUND') + '\n';
      msg += 'DMARC: ' + (data.dmarc.record ? 'Policy: ' + (data.dmarc.policy || 'none') : 'MISSING') + '\n';
      if (data.issues.length) {
        msg += '\nIssues:\n';
        data.issues.forEach(i => msg += '- [' + i.severity.toUpperCase() + '] ' + i.message + '\n');
      } else {
        msg += '\nNo issues found.';
      }
      showToast(msg, 'info', 8000);
    }).catch(() => { btn.disabled = false; btn.textContent = 'DNS Check'; });
  };

  /* ── Alert Preferences ── */
  function loadPrefs() {
    fetch('/api/alerts/preferences').then(r => r.json()).then(data => {
      if (!data.ok) return;
      const p = data.preferences;
      const canEmail = data.email_available;
      const el = document.getElementById('alertPrefs');
      el.style.opacity = '1';
      el.innerHTML = `
        <div style="display:grid;gap:12px;max-width:480px;">
          <label style="display:flex;align-items:center;gap:10px;cursor:pointer;">
            <input type="checkbox" id="prefBlocklist" ${p.blocklist_alerts ? 'checked' : ''} onchange="savePrefs()">
            <span>Blocklist change alerts</span>
          </label>
          <label style="display:flex;align-items:center;gap:10px;cursor:pointer;">
            <input type="checkbox" id="prefDns" ${p.dns_auth_alerts ? 'checked' : ''} onchange="savePrefs()">
            <span>DNS authentication alerts (SPF/DKIM/DMARC)</span>
          </label>
          <label style="display:flex;align-items:center;gap:10px;cursor:pointer;">
            <input type="checkbox" id="prefEmail" ${p.email_notifications ? 'checked' : ''} onchange="savePrefs()" ${canEmail ? '' : 'disabled'}>
            <span>Email notifications ${canEmail ? '' : '<span style="color:#f59e0b;font-size:0.8rem;">(Pro/Agency only)</span>'}</span>
          </label>
          <div style="display:flex;align-items:center;gap:10px;">
            <label for="prefDigest">Email frequency:</label>
            <select id="prefDigest" onchange="savePrefs()" style="background:var(--card-bg);color:var(--text-1);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:6px 12px;" ${canEmail ? '' : 'disabled'}>
              <option value="instant" ${p.digest_frequency==='instant'?'selected':''}>Instant</option>
              <option value="daily" ${p.digest_frequency==='daily'?'selected':''}>Daily digest</option>
              <option value="weekly" ${p.digest_frequency==='weekly'?'selected':''}>Weekly digest</option>
              <option value="off" ${p.digest_frequency==='off'?'selected':''}>Off</option>
            </select>
          </div>
          <p id="prefStatus" style="color:var(--text-3);font-size:0.8rem;margin:0;"></p>
        </div>`;
    });
  }

  window.savePrefs = function() {
    const payload = {
      blocklist_alerts: document.getElementById('prefBlocklist').checked,
      dns_auth_alerts: document.getElementById('prefDns').checked,
      email_notifications: document.getElementById('prefEmail').checked,
      digest_frequency: document.getElementById('prefDigest').value,
    };
    fetch('/api/alerts/preferences', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    }).then(r => r.json()).then(data => {
      const st = document.getElementById('prefStatus');
      if (st) { st.textContent = data.ok ? 'Saved.' : (data.error || 'Error'); setTimeout(() => st.textContent = '', 2000); }
    });
  };

  /* ── Alerts List ── */
  function renderAlertDetails(a) {
    let detail = '';
    let parsed = null;
    try { parsed = a.data_json ? JSON.parse(a.data_json) : null; } catch(e) {}
    if (!parsed) return '';

    // Blocklist alerts — show listed/delisted blocklists with delist links
    if (a.alert_type && a.alert_type.includes('blocklist') && parsed.listed_details) {
      const items = (parsed.listed_details || []).map(bl => {
        const weight = bl.weight ? `<span style="color:${bl.weight==='critical'?'#dc2626':bl.weight==='major'?'#f59e0b':'#94a3b8'};font-size:0.7rem;font-weight:600;text-transform:uppercase;margin-left:6px;">${bl.weight}</span>` : '';
        const delist = bl.delist ? `<a href="${bl.delist}" target="_blank" rel="noopener" style="display:inline-block;margin-left:8px;padding:2px 10px;font-size:0.72rem;background:#dc2626;color:#fff;border-radius:999px;text-decoration:none;font-weight:600;">Delist</a>` : '';
        const info = bl.info ? `<div style="color:var(--text-3);font-size:0.72rem;margin-top:2px;">${bl.info}</div>` : '';
        return `<div style="padding:4px 0;"><span style="color:#dc2626;font-weight:600;font-size:0.78rem;">LISTED</span> <span style="font-size:0.82rem;">${bl.name}</span>${weight}${delist}${info}</div>`;
      });
      const delisted = (parsed.delisted_details || []).map(bl => {
        return `<div style="padding:4px 0;"><span style="color:#16a34a;font-weight:600;font-size:0.78rem;">DELISTED</span> <span style="font-size:0.82rem;">${bl.name}</span></div>`;
      });
      detail = items.concat(delisted).join('');
    }

    // DNS auth alerts — show specific record changes
    if (a.alert_type === 'dns_auth_change' && parsed.dns_changes && parsed.dns_changes.length) {
      detail = parsed.dns_changes.map(ch => {
        let desc = `<strong>${ch.record}</strong>: `;
        if (ch.record === 'DMARC' && ch.old_policy !== undefined) {
          desc += ch.old_policy && ch.new_policy
            ? `policy changed from <code style="background:rgba(255,255,255,0.08);padding:1px 5px;border-radius:4px;">p=${ch.old_policy}</code> to <code style="background:rgba(255,255,255,0.08);padding:1px 5px;border-radius:4px;">p=${ch.new_policy}</code>`
            : ch.new_policy ? `policy set to <code style="background:rgba(255,255,255,0.08);padding:1px 5px;border-radius:4px;">p=${ch.new_policy}</code>` : 'record removed';
        } else if (ch.old === '(missing)') {
          desc += `record added`;
        } else if (ch.new === '(missing)') {
          desc += `record removed`;
        } else {
          desc += `record changed`;
        }
        return `<div style="padding:3px 0;font-size:0.8rem;color:var(--text-2);">${desc}</div>`;
      }).join('');

      // Also show new/resolved issues
      const newIss = (parsed.new_issues || []).map(i => `<div style="padding:2px 0;font-size:0.78rem;color:#f59e0b;">NEW: ${i.message}</div>`);
      const resIss = (parsed.resolved_issues || []).map(i => `<div style="padding:2px 0;font-size:0.78rem;color:#16a34a;">RESOLVED: ${i.message}</div>`);
      detail += newIss.concat(resIss).join('');
    }

    return detail ? `<div style="margin-top:6px;padding:8px 12px;background:rgba(255,255,255,0.03);border-radius:6px;">${detail}</div>` : '';
  }

  function loadAlerts() {
    fetch('/api/alerts?limit=20').then(r => r.json()).then(data => {
      if (!data.ok) return;
      const el = document.getElementById('alertList');
      if (!data.alerts.length) {
        el.innerHTML = '<p style="color:var(--text-3);text-align:center;padding:24px 0;">No alerts yet. Alerts will appear here when your monitored domains have changes.</p>';
        return;
      }
      el.innerHTML = data.alerts.map(a => {
        const unread = !a.is_read ? 'border-left:3px solid #22c55e;' : '';
        const icon = a.alert_type.includes('listed') ? '<span style="color:#dc2626;">&#9679;</span>' :
                     a.alert_type.includes('dns') ? '<span style="color:#f59e0b;">&#9679;</span>' :
                     '<span style="color:#22c55e;">&#9679;</span>';
        const details = renderAlertDetails(a);
        return `<div style="padding:12px 16px;${unread}background:rgba(255,255,255,0.02);border-radius:8px;margin-bottom:8px;cursor:pointer;" onclick="markAlertRead(${a.id}, this)">
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <span style="font-weight:600;font-size:0.9rem;">${icon} ${a.title}</span>
            <span style="color:var(--text-3);font-size:0.75rem;">${fmt(a.created_at)}</span>
          </div>
          ${a.message ? '<p style="color:var(--text-2);font-size:0.82rem;margin:4px 0 0;">' + a.message + '</p>' : ''}
          ${details}
        </div>`;
      }).join('');
    });
  }

  window.markAlertRead = function(id, el) {
    fetch('/api/alerts/' + id + '/read', {method: 'POST'});
    if (el) el.style.borderLeft = '';
  };

  window.markAllRead = function() {
    fetch('/api/alerts/read', {method: 'POST'}).then(() => loadAlerts());
  };

  loadMonitors();
  loadPrefs();
  loadAlerts();
  setInterval(loadMonitors, 60000);
})();
</script>
{% endblock %}
