{% extends "auth/base_auth.html" %}
{% block title %}Set New Password{% endblock %}
{% block content %}
<h1 class="auth-card__title">Set New Password</h1>

{% if error %}
<div class="auth-alert auth-alert--error">{{ error }}</div>
{% endif %}

<form method="post" class="auth-form">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
  <label class="auth-label">
    <span>New Password</span>
    <input type="password" name="password" required minlength="8" autocomplete="new-password" placeholder="At least 8 characters" />
  </label>
  <label class="auth-label">
    <span>Confirm Password</span>
    <input type="password" name="confirm_password" required minlength="8" autocomplete="new-password" />
  </label>
  <button type="submit" class="auth-btn">Reset Password</button>
</form>
{% endblock %}
