{% extends "auth/base_auth.html" %}
{% block title %}Sign Up{% endblock %}
{% block content %}
<h1 class="auth-card__title">Create Your Account</h1>
<p class="auth-card__sub">Build an inbox that sells. Free forever — no credit card.</p>

{% if error %}
<div class="auth-alert auth-alert--error">{{ error }}</div>
{% endif %}

<form method="post" class="auth-form">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
  <label class="auth-label">
    <span>Email</span>
    <input type="email" name="email" required autocomplete="email" placeholder="you@company.com" />
  </label>
  <label class="auth-label">
    <span>Name <small>(optional)</small></span>
    <input type="text" name="display_name" autocomplete="name" placeholder="Your name" />
  </label>
  <label class="auth-label">
    <span>Password</span>
    <input type="password" name="password" required minlength="8" autocomplete="new-password" placeholder="At least 8 characters" />
  </label>
  <label class="auth-label">
    <span>Confirm Password</span>
    <input type="password" name="confirm_password" required minlength="8" autocomplete="new-password" placeholder="Repeat password" />
  </label>
  <button type="submit" class="auth-btn">Create Account</button>
</form>

<p class="auth-card__footer">Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a></p>
{% endblock %}
