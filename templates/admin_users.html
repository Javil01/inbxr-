<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InbXr Admin. Users</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/style.css?v=20260409c" />
  <style>
    body { background: var(--bg-1); color: var(--text-1); font-family: 'Inter', sans-serif; }

    .au { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .au-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    .au-header h1 { font-size: 1.4rem; font-weight: 700; margin: 0; }
    .au-header-links { display: flex; gap: 12px; align-items: center; }
    .au-header-links a { color: var(--brand); text-decoration: none; font-size: 0.85rem; }
    .au-header-links .au-export-btn { padding: 7px 16px; background: var(--brand); color: #fff !important; border: none; border-radius: var(--r-full); font-size: 0.78rem; font-weight: 600; cursor: pointer; text-decoration: none; }
    .au-export-btn:hover { filter: brightness(1.15); }

    /* Summary cards */
    .au-summary { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
    .au-stat { background: var(--card-bg); border: 1px solid var(--border-1); border-radius: 10px; padding: 16px 20px; min-width: 120px; flex: 1; }
    .au-stat__num { font-size: 1.6rem; font-weight: 800; display: block; color: var(--brand); }
    .au-stat__label { font-size: 0.72rem; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.5px; }
    .au-stat--free .au-stat__num { color: var(--text-2); }
    .au-stat--pro .au-stat__num { color: #2563eb; }
    .au-stat--agency .au-stat__num { color: #7c3aed; }

    /* Filters */
    .au-filters { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
    .au-search { flex: 1; min-width: 200px; padding: 9px 14px; border: 1px solid var(--border-1); border-radius: var(--r-full); font-size: 0.84rem; background: var(--card-bg); color: var(--text-1); outline: none; }
    .au-search:focus { border-color: var(--brand); }
    .au-filter-btn { padding: 8px 14px; border: 1px solid var(--border-1); border-radius: var(--r-full); font-size: 0.78rem; background: var(--card-bg); color: var(--text-2); cursor: pointer; transition: all 0.15s; }
    .au-filter-btn:hover { border-color: var(--brand); color: var(--brand); }
    .au-filter-btn--active { background: var(--brand); color: #fff; border-color: var(--brand); }

    /* Table */
    .au-table-wrap { overflow-x: auto; background: var(--card-bg); border: 1px solid var(--border-1); border-radius: 12px; }
    .au-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    .au-table th { padding: 12px 14px; text-align: left; font-weight: 600; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-3); border-bottom: 1px solid var(--border-1); cursor: pointer; user-select: none; white-space: nowrap; }
    .au-table th:hover { color: var(--brand); }
    .au-table th .sort-arrow { margin-left: 4px; opacity: 0.4; }
    .au-table th.sorted .sort-arrow { opacity: 1; color: var(--brand); }
    .au-table td { padding: 10px 14px; border-bottom: 1px solid var(--border-1); vertical-align: middle; }
    .au-table tr:last-child td { border-bottom: none; }
    .au-table tr:hover td { background: rgba(37,99,235,0.03); cursor: pointer; }

    .au-email { font-weight: 600; color: var(--text-1); }
    .au-name { color: var(--text-3); font-size: 0.76rem; }
    .au-tier { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
    .au-tier--free { background: rgba(100,116,139,0.1); color: #64748b; }
    .au-tier--pro { background: rgba(37,99,235,0.1); color: #2563eb; }
    .au-tier--agency { background: rgba(124,58,237,0.1); color: #7c3aed; }
    .au-tier--api { background: rgba(5,150,105,0.1); color: #059669; }

    .au-verified { color: #22c55e; }
    .au-unverified { color: #ef4444; font-size: 0.72rem; }
    .au-actions select { padding: 4px 8px; border: 1px solid var(--border-1); border-radius: 6px; font-size: 0.76rem; background: var(--card-bg); color: var(--text-1); cursor: pointer; }
    .au-date { white-space: nowrap; color: var(--text-3); font-size: 0.76rem; }
    .au-num { font-weight: 600; text-align: center; }

    /* Pagination */
    .au-pagination { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 16px; }
    .au-page-btn { padding: 6px 12px; border: 1px solid var(--border-1); border-radius: 6px; font-size: 0.78rem; background: var(--card-bg); color: var(--text-2); cursor: pointer; }
    .au-page-btn:hover { border-color: var(--brand); color: var(--brand); }
    .au-page-btn:disabled { opacity: 0.4; cursor: default; }
    .au-page-info { font-size: 0.78rem; color: var(--text-3); }
    .au-loading { text-align: center; padding: 40px; color: var(--text-3); }
    .au-empty { text-align: center; padding: 40px; color: var(--text-3); font-size: 0.88rem; }

    /* ── User Profile Panel ── */
    .up-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 900; display: none; }
    .up-overlay--open { display: block; }
    .up-panel { position: fixed; right: -540px; top: 0; width: 520px; height: 100vh; background: #0f172a; border-left: 1px solid rgba(255,255,255,0.08); box-shadow: -6px 0 30px rgba(0,0,0,0.4); z-index: 1000; display: flex; flex-direction: column; transition: right 0.3s ease; overflow: hidden; }
    .up-panel--open { right: 0; }
    @media (max-width: 580px) { .up-panel { width: 100%; right: -100%; } }

    .up-panel__header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.08); flex-shrink: 0; background: #0f172a; }
    .up-panel__header h2 { font-size: 1rem; font-weight: 700; margin: 0; }
    .up-panel__close { background: none; border: none; font-size: 1.4rem; color: var(--text-3); cursor: pointer; padding: 0 4px; }
    .up-panel__close:hover { color: var(--text-1); }

    .up-panel__body { flex: 1; overflow-y: auto; padding: 20px; background: #0f172a; }

    /* Profile sections */
    .up-info { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .up-field { font-size: 0.78rem; }
    .up-field__label { color: var(--text-3); font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
    .up-field__value { font-weight: 600; }

    .up-section { margin-bottom: 20px; }
    .up-section__title { font-size: 0.82rem; font-weight: 700; margin: 0 0 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border-1); }

    /* Usage bars */
    .up-usage { display: flex; gap: 10px; margin-bottom: 16px; }
    .up-usage-card { flex: 1; background: var(--bg-2); border-radius: 8px; padding: 10px 12px; text-align: center; }
    .up-usage-card__num { font-size: 1.2rem; font-weight: 800; color: var(--brand); display: block; }
    .up-usage-card__label { font-size: 0.66rem; color: var(--text-3); text-transform: uppercase; }

    /* Tool breakdown */
    .up-breakdown { display: flex; flex-direction: column; gap: 6px; }
    .up-bd-row { display: flex; align-items: center; gap: 8px; font-size: 0.76rem; }
    .up-bd-row__label { width: 100px; color: var(--text-2); flex-shrink: 0; }
    .up-bd-row__bar { flex: 1; height: 6px; background: var(--bg-2); border-radius: 3px; overflow: hidden; }
    .up-bd-row__fill { height: 100%; background: var(--brand); border-radius: 3px; }
    .up-bd-row__count { width: 30px; text-align: right; font-weight: 600; color: var(--text-1); }

    /* History list */
    .up-history { display: flex; flex-direction: column; gap: 6px; max-height: 240px; overflow-y: auto; }
    .up-hist-item { display: flex; align-items: center; gap: 8px; font-size: 0.76rem; padding: 6px 8px; border-radius: 6px; background: var(--bg-2); }
    .up-hist-item__tool { font-weight: 600; color: var(--brand); min-width: 80px; }
    .up-hist-item__summary { flex: 1; color: var(--text-2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .up-hist-item__grade { font-weight: 700; }
    .up-hist-item__date { color: var(--text-3); font-size: 0.7rem; white-space: nowrap; }

    /* Activity log */
    .up-activity { display: flex; flex-direction: column; gap: 4px; max-height: 180px; overflow-y: auto; }
    .up-act-item { display: flex; align-items: center; gap: 8px; font-size: 0.72rem; padding: 4px 8px; }
    .up-act-item__action { font-weight: 600; min-width: 90px; }
    .up-act-item__ip { color: var(--text-3); flex: 1; }
    .up-act-item__date { color: var(--text-3); white-space: nowrap; }

    /* Notes */
    .up-notes { display: flex; flex-direction: column; gap: 8px; }
    .up-note { background: #fef9c3; border: 1px solid #fde68a; border-radius: 8px; padding: 8px 12px; font-size: 0.78rem; position: relative; }
    .up-note__text { color: #713f12; line-height: 1.5; white-space: pre-wrap; }
    .up-note__meta { font-size: 0.66rem; color: #a16207; margin-top: 4px; }
    .up-note__delete { position: absolute; top: 6px; right: 8px; background: none; border: none; color: #d97706; cursor: pointer; font-size: 0.88rem; opacity: 0.5; }
    .up-note__delete:hover { opacity: 1; }
    .up-note-form { display: flex; gap: 8px; }
    .up-note-input { flex: 1; padding: 8px 12px; border: 1px solid var(--border-1); border-radius: 8px; font-size: 0.78rem; resize: none; min-height: 36px; font-family: inherit; }
    .up-note-submit { padding: 8px 14px; background: var(--brand); color: #fff; border: none; border-radius: 8px; font-size: 0.76rem; font-weight: 600; cursor: pointer; white-space: nowrap; }
    .up-note-submit:hover { filter: brightness(1.15); }
    .up-empty { color: var(--text-3); font-size: 0.78rem; font-style: italic; }

    /* Action & flag buttons */
    .up-action-btn { padding: 4px 12px; border: none; border-radius: var(--r-full); font-size: 0.72rem; font-weight: 600; cursor: pointer; }
    .up-action-btn--red { background: rgba(239,68,68,0.1); color: #ef4444; }
    .up-action-btn--red:hover { background: rgba(239,68,68,0.2); }
    .up-action-btn--green { background: rgba(34,197,94,0.1); color: #22c55e; }
    .up-action-btn--green:hover { background: rgba(34,197,94,0.2); }
    .up-flag-btn { padding: 3px 10px; border: 1px solid var(--border-1); border-radius: var(--r-full); font-size: 0.68rem; font-weight: 600; cursor: pointer; background: transparent; color: var(--text-3); transition: all 0.15s; }
    .up-flag-btn:hover { border-color: var(--flag-color); color: var(--flag-color); }
    .up-flag-btn--active { background: color-mix(in srgb, var(--flag-color) 10%, transparent); border-color: var(--flag-color); color: var(--flag-color); }
    .up-note-form { display: flex; flex-direction: column; gap: 8px; }

    /* Email compose */
    .up-email-form { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
    .up-email-form input, .up-email-form textarea { padding: 8px 12px; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; font-size: 0.78rem; font-family: inherit; background: rgba(255,255,255,0.04); color: #dbeafe; }
    .up-email-form input:focus, .up-email-form textarea:focus { border-color: #2563eb; outline: none; }
    .up-email-form textarea { min-height: 80px; resize: vertical; }
    .up-email-send { padding: 8px 14px; background: #2563eb; color: #fff; border: none; border-radius: 8px; font-size: 0.76rem; font-weight: 600; cursor: pointer; }
    .up-email-send:hover { filter: brightness(1.15); }
    .up-email-send:disabled { opacity: 0.5; cursor: not-allowed; }
    .up-email-toggle { padding: 4px 12px; border: 1px solid rgba(37,99,235,0.3); background: rgba(37,99,235,0.08); color: #2563eb; border-radius: 999px; font-size: 0.72rem; font-weight: 600; cursor: pointer; }
    .up-email-toggle:hover { background: rgba(37,99,235,0.15); }

    /* Bulk email modal */
    .be-modal { position: fixed; inset: 0; z-index: 2000; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.6); }
    .be-modal--open { display: flex; }
    .be-box { background: #0f172a; border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 28px; width: 90%; max-width: 520px; max-height: 90vh; overflow-y: auto; }
    .be-box h3 { font-size: 1.1rem; font-weight: 700; margin: 0 0 16px; }
    .be-field { margin-bottom: 12px; }
    .be-field label { display: block; font-size: 0.72rem; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .be-field input, .be-field textarea, .be-field select { width: 100%; padding: 10px 14px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #dbeafe; font-family: inherit; font-size: 0.82rem; }
    .be-field textarea { min-height: 100px; resize: vertical; }
    .be-field input:focus, .be-field textarea:focus, .be-field select:focus { border-color: #2563eb; outline: none; }
    .be-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }
    .be-btn { padding: 10px 20px; border: none; border-radius: 999px; font-size: 0.82rem; font-weight: 600; cursor: pointer; }
    .be-btn--cancel { background: rgba(255,255,255,0.08); color: #94a3b8; }
    .be-btn--send { background: #2563eb; color: #fff; }
    .be-btn--send:hover { background: #1d4ed8; }
    .be-btn--send:disabled { opacity: 0.5; cursor: not-allowed; }
    .be-result { margin-top: 12px; padding: 10px 14px; border-radius: 8px; font-size: 0.82rem; font-weight: 600; }
    .be-result--ok { background: rgba(34,197,94,0.1); color: #22c55e; }
    .be-result--err { background: rgba(239,68,68,0.1); color: #ef4444; }
  </style>
</head>
<body>

{% include 'sections/header.html' %}

<div class="au">
  <div class="au-header">
    <h1>User Management</h1>
    <div class="au-header-links">
      <button class="au-export-btn" style="background:#7c3aed" onclick="openBulkEmail()">Bulk Email</button>
      <a href="/admin/api/users/export" class="au-export-btn" id="exportBtn">Export CSV</a>
      <a href="/admin">&larr; Admin Dashboard</a>
    </div>
  </div>

  <div class="au-summary" id="auSummary"></div>

  <div class="au-filters">
    <input type="text" class="au-search" id="auSearch" placeholder="Search by email or name..." />
    <button class="au-filter-btn au-filter-btn--active" data-tier="">All</button>
    <button class="au-filter-btn" data-tier="free">Free</button>
    <button class="au-filter-btn" data-tier="pro">Pro</button>
    <button class="au-filter-btn" data-tier="agency">Agency</button>
    <button class="au-filter-btn" data-tier="api">API</button>
  </div>

  <div class="au-table-wrap">
    <table class="au-table">
      <thead>
        <tr>
          <th data-sort="email">Email <span class="sort-arrow">&#9650;</span></th>
          <th data-sort="tier">Tier <span class="sort-arrow">&#9650;</span></th>
          <th>Verified</th>
          <th>Checks</th>
          <th>Today</th>
          <th>Last Active</th>
          <th data-sort="created_at" class="sorted">Joined <span class="sort-arrow">&#9660;</span></th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="auBody">
        <tr><td colspan="8" class="au-loading">Loading users...</td></tr>
      </tbody>
    </table>
  </div>

  <div class="au-pagination" id="auPagination"></div>
</div>

<!-- User Profile Panel -->
<div class="up-overlay" id="upOverlay"></div>
<div class="up-panel" id="upPanel">
  <div class="up-panel__header">
    <h2 id="upTitle">User Profile</h2>
    <button class="up-panel__close" id="upClose">&times;</button>
  </div>
  <div class="up-panel__body" id="upBody">
    <div class="au-loading">Loading...</div>
  </div>
</div>

<!-- Bulk Email Modal -->
<div class="be-modal" id="beModal">
  <div class="be-box">
    <h3>Bulk Email</h3>
    <div class="be-field">
      <label>Recipients</label>
      <select id="beRecipients">
        <option value="all">All Active Users</option>
        <option value="tier:free">All Free Users</option>
        <option value="tier:pro">All Pro Users</option>
        <option value="tier:agency">All Agency Users</option>
        <option value="verified">Verified Users Only</option>
        <option value="unverified">Unverified Users</option>
        <option value="active_7d">Active (Last 7 Days)</option>
        <option value="dormant_30d">Dormant (30+ Days)</option>
      </select>
    </div>
    <div class="be-field">
      <label>Subject</label>
      <input type="text" id="beSubject" placeholder="Email subject line..." />
    </div>
    <div class="be-field">
      <label>Body (plain text, newlines become paragraphs)</label>
      <textarea id="beBody" placeholder="Write your message here..."></textarea>
    </div>
    <div id="beResult"></div>
    <div class="be-actions">
      <button class="be-btn be-btn--cancel" onclick="closeBulkEmail()">Cancel</button>
      <button class="be-btn be-btn--send" id="beSendBtn" onclick="sendBulkEmail()">Send Email</button>
    </div>
  </div>
</div>

<script>
(function() {
  var currentPage = 1;
  var currentSort = 'created_at';
  var currentOrder = 'desc';
  var currentTier = '';
  var searchTimeout = null;
  var currentProfileId = null;

  // ── CSV export: append tier filter ──
  document.querySelectorAll('.au-filter-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      currentTier = this.dataset.tier;
      currentPage = 1;
      document.querySelectorAll('.au-filter-btn').forEach(function(b) { b.classList.remove('au-filter-btn--active'); });
      this.classList.add('au-filter-btn--active');
      updateExportLink();
      loadUsers();
    });
  });

  function updateExportLink() {
    var btn = document.getElementById('exportBtn');
    btn.href = '/admin/api/users/export' + (currentTier ? '?tier=' + currentTier : '');
  }

  function loadUsers() {
    var q = document.getElementById('auSearch').value.trim();
    var params = '?page=' + currentPage + '&sort=' + currentSort + '&order=' + currentOrder;
    if (q) params += '&q=' + encodeURIComponent(q);
    if (currentTier) params += '&tier=' + currentTier;

    fetch('/admin/api/users' + params)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        renderSummary(data.summary);
        renderTable(data.users);
        renderPagination(data.summary);
      })
      .catch(function() {
        document.getElementById('auBody').innerHTML = '<tr><td colspan="8" class="au-empty">Failed to load users.</td></tr>';
      });
  }

  function renderSummary(s) {
    var tc = s.tier_counts || {};
    document.getElementById('auSummary').innerHTML =
      statCard(s.total_users, 'Total Users', '') +
      statCard(tc.free || 0, 'Free', 'free') +
      statCard(tc.pro || 0, 'Pro', 'pro') +
      statCard(tc.agency || 0, 'Agency', 'agency') +
      statCard(tc.api || 0, 'API', '');
  }

  function statCard(num, label, tier) {
    var cls = tier ? ' au-stat--' + tier : '';
    return '<div class="au-stat' + cls + '"><span class="au-stat__num">' + num + '</span><span class="au-stat__label">' + esc(label) + '</span></div>';
  }

  function renderTable(users) {
    var body = document.getElementById('auBody');
    if (!users.length) {
      body.innerHTML = '<tr><td colspan="8" class="au-empty">No users found.</td></tr>';
      return;
    }
    var html = '';
    users.forEach(function(u) {
      html += '<tr data-uid="' + u.id + '">' +
        '<td><span class="au-email">' + esc(u.email) + '</span>' +
          (u.display_name ? '<br><span class="au-name">' + esc(u.display_name) + '</span>' : '') +
        '</td>' +
        '<td><span class="au-tier au-tier--' + u.tier + '">' + u.tier + '</span></td>' +
        '<td>' + (u.email_verified ? '<span class="au-verified">&#10003;</span>' : '<span class="au-unverified">No</span>') + '</td>' +
        '<td class="au-num">' + (u.total_checks || 0) + '</td>' +
        '<td class="au-num">' + (u.checks_today || 0) + '</td>' +
        '<td class="au-date">' + relDate(u.last_active) + '</td>' +
        '<td class="au-date">' + shortDate(u.created_at) + '</td>' +
        '<td class="au-actions" onclick="event.stopPropagation()">' +
          '<select data-uid="' + u.id + '" onchange="changeTier(this)">' +
            tierOption('free', u.tier) +
            tierOption('pro', u.tier) +
            tierOption('agency', u.tier) +
            tierOption('api', u.tier) +
          '</select>' +
        '</td>' +
      '</tr>';
    });
    body.innerHTML = html;

    // Click row to open profile
    body.querySelectorAll('tr[data-uid]').forEach(function(row) {
      row.addEventListener('click', function() {
        openProfile(parseInt(this.dataset.uid));
      });
    });
  }

  function tierOption(tier, current) {
    return '<option value="' + tier + '"' + (tier === current ? ' selected' : '') + '>' + tier.charAt(0).toUpperCase() + tier.slice(1) + '</option>';
  }

  function renderPagination(s) {
    var el = document.getElementById('auPagination');
    if (s.total_pages <= 1) { el.innerHTML = ''; return; }
    el.innerHTML =
      '<button class="au-page-btn" onclick="goPage(' + (s.page - 1) + ')"' + (s.page <= 1 ? ' disabled' : '') + '>&laquo; Prev</button>' +
      '<span class="au-page-info">Page ' + s.page + ' of ' + s.total_pages + '</span>' +
      '<button class="au-page-btn" onclick="goPage(' + (s.page + 1) + ')"' + (s.page >= s.total_pages ? ' disabled' : '') + '>Next &raquo;</button>';
  }

  // ── User Profile Panel ──
  var overlay = document.getElementById('upOverlay');
  var panel = document.getElementById('upPanel');

  function openProfile(uid) {
    currentProfileId = uid;
    overlay.classList.add('up-overlay--open');
    panel.classList.add('up-panel--open');
    document.getElementById('upBody').innerHTML = '<div class="au-loading">Loading profile...</div>';

    fetch('/admin/api/users/' + uid + '/profile')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.error) {
          document.getElementById('upBody').innerHTML = '<p>' + esc(data.error) + '</p>';
          return;
        }
        renderProfile(data);
      })
      .catch(function() {
        document.getElementById('upBody').innerHTML = '<p>Failed to load profile.</p>';
      });
  }

  function closeProfile() {
    overlay.classList.remove('up-overlay--open');
    panel.classList.remove('up-panel--open');
    currentProfileId = null;
  }

  document.getElementById('upClose').addEventListener('click', closeProfile);
  overlay.addEventListener('click', closeProfile);

  function renderProfile(data) {
    var u = data.user;
    var usage = data.usage;
    document.getElementById('upTitle').textContent = u.email;

    var html = '';

    // Status & Actions bar
    var isSuspended = u.status === 'suspended';
    html += '<div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center">';
    if (isSuspended) {
      html += '<span style="padding:4px 12px;border-radius:999px;font-size:0.72rem;font-weight:700;background:rgba(239,68,68,0.1);color:#ef4444">SUSPENDED</span>' +
        '<button class="up-action-btn up-action-btn--green" onclick="reactivateUser(' + u.id + ')">Reactivate</button>';
    } else {
      html += '<span style="padding:4px 12px;border-radius:999px;font-size:0.72rem;font-weight:700;background:rgba(34,197,94,0.1);color:#22c55e">ACTIVE</span>' +
        '<button class="up-action-btn up-action-btn--red" onclick="suspendUser(' + u.id + ')">Suspend</button>';
    }
    // Email button
    html += '<button class="up-email-toggle" onclick="toggleEmailForm(' + u.id + ')">Email User</button>';
    // Flags
    var flags = (u.admin_flags || '').split(',').filter(function(f) { return f; });
    html += '<span style="flex:1"></span>';
    var flagOptions = ['vip', 'follow_up', 'spammer'];
    flagOptions.forEach(function(f) {
      var active = flags.indexOf(f) > -1;
      var colors = { vip: '#d97706', follow_up: '#2563eb', spammer: '#ef4444' };
      var labels = { vip: 'VIP', follow_up: 'Follow-up', spammer: 'Spammer' };
      html += '<button class="up-flag-btn' + (active ? ' up-flag-btn--active' : '') + '" ' +
        'style="--flag-color:' + colors[f] + '" ' +
        'onclick="toggleFlag(' + u.id + ',\'' + f + '\',' + !active + ')">' + labels[f] + '</button>';
    });
    html += '</div>';

    // Email compose form (hidden by default)
    html += '<div id="emailForm" style="display:none;margin-bottom:14px">' +
      '<div class="up-email-form">' +
        '<input type="text" id="emailSubject" placeholder="Subject..." />' +
        '<textarea id="emailBody" placeholder="Message body (plain text)..."></textarea>' +
        '<div style="display:flex;gap:8px;align-items:center">' +
          '<button class="up-email-send" onclick="sendUserEmail(' + u.id + ')">Send</button>' +
          '<span id="emailStatus" style="font-size:0.72rem"></span>' +
        '</div>' +
      '</div>' +
    '</div>';

    // Basic info
    html += '<div class="up-info">' +
      upField('Email', u.email) +
      upField('Name', u.display_name || '·') +
      upField('Tier', '<span class="au-tier au-tier--' + u.tier + '">' + u.tier + '</span>') +
      upField('Verified', u.email_verified ? '<span class="au-verified">Yes</span>' : '<span class="au-unverified">No</span>') +
      upField('Joined', shortDate(u.created_at)) +
      upField('Updated', shortDate(u.updated_at)) +
      upField('Stripe', u.stripe_customer_id ? '<code style="font-size:0.7rem">' + esc(u.stripe_customer_id) + '</code>' : '·') +
      upField('API Key', u.api_key ? '<code style="font-size:0.7rem">' + esc(u.api_key.substring(0, 12)) + '...</code>' : '·') +
    '</div>';

    // Usage
    html += '<div class="up-section">' +
      '<h3 class="up-section__title">Usage</h3>' +
      '<div class="up-usage">' +
        usageCard(usage.today, 'Today') +
        usageCard(usage.week, '7 Days') +
        usageCard(usage.month, '30 Days') +
      '</div>' +
    '</div>';

    // Tool breakdown
    if (data.tool_breakdown && data.tool_breakdown.length) {
      var maxBd = Math.max.apply(null, data.tool_breakdown.map(function(b) { return b.cnt; }));
      html += '<div class="up-section"><h3 class="up-section__title">Tool Breakdown</h3><div class="up-breakdown">';
      data.tool_breakdown.forEach(function(b) {
        var pct = Math.round(b.cnt / maxBd * 100);
        html += '<div class="up-bd-row">' +
          '<span class="up-bd-row__label">' + esc(b.action) + '</span>' +
          '<div class="up-bd-row__bar"><div class="up-bd-row__fill" style="width:' + pct + '%"></div></div>' +
          '<span class="up-bd-row__count">' + b.cnt + '</span>' +
        '</div>';
      });
      html += '</div></div>';
    }

    // Teams
    if (data.teams && data.teams.length) {
      html += '<div class="up-section"><h3 class="up-section__title">Teams</h3>';
      data.teams.forEach(function(t) {
        html += '<div class="up-hist-item"><span class="up-hist-item__tool">' + esc(t.name) + '</span><span class="up-hist-item__summary">' + esc(t.role) + '</span></div>';
      });
      html += '</div>';
    }

    // Test history
    html += '<div class="up-section"><h3 class="up-section__title">Recent Test History</h3>';
    if (data.history && data.history.length) {
      html += '<div class="up-history">';
      data.history.forEach(function(h) {
        html += '<div class="up-hist-item">' +
          '<span class="up-hist-item__tool">' + esc(h.tool) + '</span>' +
          '<span class="up-hist-item__summary">' + esc(h.input_summary || '') + '</span>' +
          (h.grade ? '<span class="up-hist-item__grade">' + esc(h.grade) + '</span>' : '') +
          (h.score != null ? '<span style="font-size:0.72rem;color:var(--text-3)">' + h.score + '</span>' : '') +
          '<span class="up-hist-item__date">' + relDate(h.created_at) + '</span>' +
        '</div>';
      });
      html += '</div>';
    } else {
      html += '<p class="up-empty">No test history.</p>';
    }
    html += '</div>';

    // Activity log
    html += '<div class="up-section"><h3 class="up-section__title">Recent Activity</h3>';
    if (data.activity && data.activity.length) {
      html += '<div class="up-activity">';
      data.activity.forEach(function(a) {
        html += '<div class="up-act-item">' +
          '<span class="up-act-item__action">' + esc(a.action) + '</span>' +
          '<span class="up-act-item__ip">' + esc(a.ip_address || '') + '</span>' +
          '<span class="up-act-item__date">' + relDate(a.created_at) + '</span>' +
        '</div>';
      });
      html += '</div>';
    } else {
      html += '<p class="up-empty">No activity recorded.</p>';
    }
    html += '</div>';

    // Notes
    html += '<div class="up-section"><h3 class="up-section__title">Admin Notes</h3>';
    html += '<div class="up-note-form">' +
      '<textarea class="up-note-input" id="noteInput" placeholder="Add a note about this user..."></textarea>' +
      '<div style="display:flex;gap:8px;align-items:center">' +
        '<select id="noteTag" style="padding:5px 8px;border:1px solid var(--border-1);border-radius:6px;font-size:0.76rem;background:var(--card-bg);color:var(--text-1)">' +
          '<option value="general">General</option>' +
          '<option value="vip">VIP</option>' +
          '<option value="support">Support</option>' +
          '<option value="complaint">Complaint</option>' +
          '<option value="follow_up">Follow-up</option>' +
          '<option value="bug">Bug Report</option>' +
        '</select>' +
        '<button class="up-note-submit" id="noteSubmit">Add</button>' +
      '</div>' +
    '</div>';
    html += '<div class="up-notes" id="upNotes" style="margin-top:10px">';
    if (data.notes && data.notes.length) {
      data.notes.forEach(function(n) {
        html += noteHtml(n);
      });
    } else {
      html += '<p class="up-empty" id="noNotes">No notes yet.</p>';
    }
    html += '</div></div>';

    document.getElementById('upBody').innerHTML = html;

    // Note submit handler
    document.getElementById('noteSubmit').addEventListener('click', function() {
      var input = document.getElementById('noteInput');
      var text = input.value.trim();
      if (!text) return;

      var tag = document.getElementById('noteTag').value;
      fetch('/admin/api/users/' + currentProfileId + '/notes', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ note: text, tag: tag })
      }).then(function(r) { return r.json(); }).then(function(d) {
        if (d.ok) {
          input.value = '';
          // Reload profile to get the new note with ID
          openProfile(currentProfileId);
        }
      });
    });
  }

  function noteHtml(n) {
    var tagColors = { general: '#64748b', vip: '#d97706', support: '#2563eb', complaint: '#ef4444', follow_up: '#7c3aed', bug: '#059669' };
    var tagLabels = { general: 'General', vip: 'VIP', support: 'Support', complaint: 'Complaint', follow_up: 'Follow-up', bug: 'Bug' };
    var tag = n.tag || 'general';
    return '<div class="up-note" data-nid="' + n.id + '">' +
      '<button class="up-note__delete" onclick="deleteNote(' + n.id + ')" title="Delete note">&times;</button>' +
      '<span style="display:inline-block;padding:1px 7px;border-radius:999px;font-size:0.62rem;font-weight:700;background:' + tagColors[tag] + '22;color:' + tagColors[tag] + ';margin-bottom:4px">' + (tagLabels[tag] || tag) + '</span>' +
      '<div class="up-note__text">' + esc(n.note) + '</div>' +
      '<div class="up-note__meta">' + relDate(n.created_at) + '</div>' +
    '</div>';
  }

  window.suspendUser = function(uid) {
    if (!confirm('Suspend this user? They will not be able to use the platform.')) return;
    fetch('/admin/api/users/' + uid + '/suspend', { method: 'POST' })
      .then(function(r) { return r.json(); })
      .then(function(d) { if (d.ok) openProfile(uid); else showToast(d.error || 'Failed', 'error'); });
  };

  window.reactivateUser = function(uid) {
    fetch('/admin/api/users/' + uid + '/reactivate', { method: 'POST' })
      .then(function(r) { return r.json(); })
      .then(function(d) { if (d.ok) openProfile(uid); else showToast(d.error || 'Failed', 'error'); });
  };

  window.toggleFlag = function(uid, flag, add) {
    // Get current flags, toggle the one clicked
    fetch('/admin/api/users/' + uid + '/profile')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var flags = (data.user.admin_flags || '').split(',').filter(function(f) { return f; });
        if (add && flags.indexOf(flag) === -1) flags.push(flag);
        else if (!add) flags = flags.filter(function(f) { return f !== flag; });
        return fetch('/admin/api/users/' + uid + '/flags', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ flags: flags.join(',') })
        });
      })
      .then(function(r) { return r.json(); })
      .then(function(d) { if (d.ok) openProfile(uid); });
  };

  window.deleteNote = function(noteId) {
    if (!confirm('Delete this note?')) return;
    fetch('/admin/api/users/' + currentProfileId + '/notes/' + noteId, { method: 'DELETE' })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (d.ok) {
          var el = document.querySelector('.up-note[data-nid="' + noteId + '"]');
          if (el) el.remove();
        }
      });
  };

  function upField(label, value) {
    return '<div class="up-field"><div class="up-field__label">' + esc(label) + '</div><div class="up-field__value">' + value + '</div></div>';
  }

  function usageCard(num, label) {
    return '<div class="up-usage-card"><span class="up-usage-card__num">' + (num || 0) + '</span><span class="up-usage-card__label">' + esc(label) + '</span></div>';
  }

  // ── Tier change ──
  window.changeTier = function(sel) {
    var uid = sel.dataset.uid;
    var newTier = sel.value;
    if (!confirm('Change this user to ' + newTier + '?')) {
      loadUsers();
      return;
    }
    fetch('/admin/api/users/' + uid + '/tier', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tier: newTier })
    }).then(function(r) { return r.json(); }).then(function(d) {
      if (d.ok) loadUsers();
      else showToast(d.error || 'Failed', 'error');
    });
  };

  window.goPage = function(p) { currentPage = p; loadUsers(); };

  // ── Sort ──
  document.querySelectorAll('.au-table th[data-sort]').forEach(function(th) {
    th.addEventListener('click', function() {
      var s = this.dataset.sort;
      if (currentSort === s) { currentOrder = currentOrder === 'desc' ? 'asc' : 'desc'; }
      else { currentSort = s; currentOrder = 'desc'; }
      currentPage = 1;
      document.querySelectorAll('.au-table th').forEach(function(h) { h.classList.remove('sorted'); });
      this.classList.add('sorted');
      this.querySelector('.sort-arrow').innerHTML = currentOrder === 'desc' ? '&#9660;' : '&#9650;';
      loadUsers();
    });
  });

  // ── Search ──
  document.getElementById('auSearch').addEventListener('input', function() {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(function() { currentPage = 1; loadUsers(); }, 300);
  });

  // ── Helpers ──
  function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function relDate(d) {
    if (!d) return '<span style="color:var(--text-3)">Never</span>';
    try {
      var diff = Date.now() - new Date(d + 'Z').getTime();
      if (diff < 60000) return 'Just now';
      if (diff < 3600000) return Math.floor(diff/60000) + 'm ago';
      if (diff < 86400000) return Math.floor(diff/3600000) + 'h ago';
      if (diff < 604800000) return Math.floor(diff/86400000) + 'd ago';
      return shortDate(d);
    } catch(e) { return ''; }
  }

  function shortDate(d) {
    if (!d) return '';
    try {
      var dt = new Date(d + 'Z');
      return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    } catch(e) { return ''; }
  }

  // ── Email User ──
  window.toggleEmailForm = function(uid) {
    var form = document.getElementById('emailForm');
    if (form) form.style.display = form.style.display === 'none' ? 'block' : 'none';
  };

  window.sendUserEmail = function(uid) {
    var subject = document.getElementById('emailSubject').value.trim();
    var body = document.getElementById('emailBody').value.trim();
    var status = document.getElementById('emailStatus');
    if (!subject || !body) { status.textContent = 'Subject and body required'; status.style.color = '#ef4444'; return; }
    status.textContent = 'Sending...'; status.style.color = '#94a3b8';
    fetch('/admin/api/users/' + uid + '/email', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ subject: subject, body: body })
    })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.ok) {
        status.textContent = 'Sent!'; status.style.color = '#22c55e';
        document.getElementById('emailSubject').value = '';
        document.getElementById('emailBody').value = '';
      } else {
        status.textContent = d.error || 'Failed'; status.style.color = '#ef4444';
      }
    })
    .catch(function() { status.textContent = 'Failed'; status.style.color = '#ef4444'; });
  };

  // ── Bulk Email ──
  window.openBulkEmail = function() {
    document.getElementById('beModal').classList.add('be-modal--open');
    document.getElementById('beResult').innerHTML = '';
  };

  window.closeBulkEmail = function() {
    document.getElementById('beModal').classList.remove('be-modal--open');
  };

  window.sendBulkEmail = function() {
    var subject = document.getElementById('beSubject').value.trim();
    var body = document.getElementById('beBody').value.trim();
    var recipientVal = document.getElementById('beRecipients').value;
    var result = document.getElementById('beResult');
    var btn = document.getElementById('beSendBtn');

    if (!subject || !body) {
      result.innerHTML = '<div class="be-result be-result--err">Subject and body are required.</div>';
      return;
    }

    var payload = { subject: subject, body: body };
    if (recipientVal.startsWith('tier:')) {
      payload.tier = recipientVal.split(':')[1];
    } else {
      payload.segment = recipientVal;
    }

    // Count preview
    var recipientLabel = document.getElementById('beRecipients').selectedOptions[0].text;
    if (!confirm('Send "' + subject + '" to ' + recipientLabel + '? This cannot be undone.')) return;

    btn.disabled = true;
    btn.textContent = 'Sending...';
    result.innerHTML = '';

    fetch('/admin/api/users/bulk-email', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      btn.disabled = false;
      btn.textContent = 'Send Email';
      if (d.ok) {
        result.innerHTML = '<div class="be-result be-result--ok">Sent ' + d.sent + ' of ' + d.total + ' emails.' + (d.failed ? ' (' + d.failed + ' failed)' : '') + '</div>';
      } else {
        result.innerHTML = '<div class="be-result be-result--err">' + (d.error || 'Failed to send.') + '</div>';
      }
    })
    .catch(function() {
      btn.disabled = false;
      btn.textContent = 'Send Email';
      result.innerHTML = '<div class="be-result be-result--err">Network error.</div>';
    });
  };

  // Close bulk email on backdrop click
  document.getElementById('beModal').addEventListener('click', function(e) {
    if (e.target === this) closeBulkEmail();
  });

  loadUsers();
})();
</script>

</body>
</html>
