<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#15c182"/>
      <stop offset="100%" style="stop-color:#03a071"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Envelope body -->
  <rect x="86" y="152" width="340" height="230" rx="20" fill="none" stroke="url(#teal)" stroke-width="24"/>
  <!-- Envelope flap lines -->
  <line x1="86" y1="152" x2="256" y2="296" stroke="url(#teal)" stroke-width="24" stroke-linecap="round"/>
  <line x1="426" y1="152" x2="256" y2="296" stroke="url(#teal)" stroke-width="24" stroke-linecap="round"/>
  <!-- Signal arcs (inbox/deliverability indicator) -->
  <path d="M 316 108 A 40 40 0 0 1 356 108" fill="none" stroke="#15c182" stroke-width="14" stroke-linecap="round" opacity="0.5"/>
  <path d="M 296 88 A 70 70 0 0 1 376 88" fill="none" stroke="#15c182" stroke-width="14" stroke-linecap="round" opacity="0.35"/>
</svg>
